<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Details | FormBoost</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Public+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="pages.css">
</head>

<body>
    <header class="page-header">
        <div class="container row">
            <a href="../index.html" class="brand">FormBoost</a>
            <p class="crumb">Step 1 of 2</p>
        </div>
    </header>

    <main class="container page-grid">
        <section class="card wide">
            <h1>Submit your request</h1>
            <p class="lead">Fill these details so we can deliver responses in your preferred format.</p>

            <form id="request-form" class="form-grid">
                <label>
                    Your Name
                    <input type="text" id="clientName" required placeholder="e.g. Deep Patel">
                </label>
                <label>
                    Email or WhatsApp
                    <input type="text" id="contact" required placeholder="e.g. deep@example.com">
                </label>
                <label class="full">
                    Google Form Link
                    <input type="url" id="formLink" required placeholder="https://docs.google.com/forms/...">
                </label>
                <label>
                    Required Responses
                    <select id="responses" required>
                        <option value="500">500</option>
                        <option value="1000">1000</option>
                        <option value="1500">1500</option>
                        <option value="2000">2000</option>
                    </select>
                </label>
                <label>
                    Audience Style
                    <select id="audience" required>
                        <option value="General mixed users">General mixed users</option>
                        <option value="Students">Students</option>
                        <option value="Working professionals">Working professionals</option>
                        <option value="Custom">Custom</option>
                    </select>
                </label>
                <label class="full">
                    Notes (optional)
                    <textarea id="notes" rows="4" placeholder="Any specific pattern, location, age group, or answer preference"></textarea>
                </label>

                <button class="btn btn-primary full" type="submit">Continue to Payment</button>
            </form>
        </section>

        <aside class="card">
            <h2>Order summary</h2>
            <dl class="summary" id="summaryBox">
                <div>
                    <dt>Plan</dt>
                    <dd id="sumPlan">1000 Responses</dd>
                </div>
                <div>
                    <dt>Amount</dt>
                    <dd id="sumAmount">INR 500</dd>
                </div>
                <div>
                    <dt>Delivery</dt>
                    <dd>24-48 hours</dd>
                </div>
            </dl>
            <p class="hint">Your selected plan from homepage is auto-loaded here. You can still change response count above.</p>
        </aside>
    </main>

    <script src="app.js"></script>
</body>

</html>
